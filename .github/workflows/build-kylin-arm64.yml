name: Build ELF for Kylin ARM64 (Zero-Dependency)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    # GitHub 官方 ARM64 Linux 运行器（Ubuntu 22.04，glibc 2.35，与麒麟 V10 桌面版兼容性好）
    runs-on: ubuntu-22.04-arm
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3-tk patchelf binutils file upx-ucl

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build standalone ELF via PyInstaller
        run: |
          pyinstaller qingsongping.spec

      - name: Verify binary architecture
        run: |
          echo "=== 文件类型 ==="
          file dist/轻松评
          echo "=== ELF 头信息 ==="
          readelf -h dist/轻松评 | grep -E "Machine|Type|Class"
          echo "=== 文件大小 ==="
          ls -lh dist/轻松评

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 轻松评-kylin-arm64-elf
          path: dist/轻松评
          retention-days: 30

      - name: Auto Release on Tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/轻松评
